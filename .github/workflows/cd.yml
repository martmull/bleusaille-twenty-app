name: CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [labeled]

permissions:
  contents: read

env:
  TWENTY_DEPLOY_URL: ${{ vars.TWENTY_DEPLOY_URL }}
  TWENTY_DEPLOY_API_KEY: ${{ secrets.TWENTY_DEPLOY_API_KEY }}

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-and-install:
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && github.event.label.name == 'deploy')
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Check deploy config
        run: |
          if [ -z "$TWENTY_DEPLOY_URL" ]; then
            echo "::error::TWENTY_DEPLOY_URL is empty. Set it in the 'Production' environment (Settings → Environments → Production → Variables)."
            exit 1
          fi
          if [ -z "$TWENTY_DEPLOY_API_KEY" ]; then
            echo "::error::TWENTY_DEPLOY_API_KEY is empty. Set it in the 'Production' environment (Settings → Environments → Production → Secrets)."
            exit 1
          fi

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: yarn

      - name: Install dependencies
        run: yarn install --immutable

      - name: Authenticate remote
        run: >-
          yarn twenty remote:add
          --as ci
          --url "$TWENTY_DEPLOY_URL"
          --api-key "$TWENTY_DEPLOY_API_KEY"

      - name: Publish app
        run: yarn twenty dev --once
